# 接口名称：音色设计接口
# 生成接口：POST /open/timbre-design/generate
# 状态接口：GET /open/timbre-design/status
# 请求方式：生成接口使用 application/json，状态接口使用 query params
# 数据说明：
# - cases 维护音色设计生成用例
# - status_cases 维护音色设计状态查询用例
# 关联字段：生成接口返回 request_id，状态查询接口通过 params.request_id 查询。

timbre_design:
  limit:
    input: "text"
    text_max_chars: 500
  cases:
    # --- 字段说明 ---
    # json: JSON 请求体字段（text / langCode / genderValue / ageValue 等）
    # ---
    - id: "TD_POS_001"
      title: "音色设计-合法500字符以内文本"
      category: "positive"
      json:
        text: "这是一段测试文本"
        langCode: "zh"
        genderValue: "1"
        ageValue: "2"
        pitchValue: "4"
        styleValue: "1"
        accentValue: "1"
      expected:
        http_status: 200
        required_fields: ["request_id"]
    - id: "TD_NEG_001"
      title: "音色设计-文本为空"
      category: "negative"
      json:
        text: ""
        langCode: "zh"
        genderValue: "1"
        ageValue: "2"
      expected:
        http_status_any: [400, 422, 500]
        code: 400
        message_contains_any: ["text","必填"]
