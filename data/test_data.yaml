  task_id: "replace-with-valid-task-id"
  project_id: "replace-with-valid-project-id"
  request_id: "replace-with-valid-request-id"

files:
  valid_audio: "data/mock_files/青蛙王子-译制音频_关BGM.wav"
  valid_clone_audio: "data/mock_files/青蛙王子-译制音频_关BGM.wav"
  valid_clone_open_audio: "data/mock_files/青蛙王子-译制音频_开BGM.wav"
  valid_clone_50mb: "data/mock_files/50MB.wav"
  valid_clone_1min_10mb: "data/mock_files/audio_1min_under10MB.wav"
  valid_subtitle: "data/mock_files/青蛙王子-中文字幕.srt"
  valid_subtitle_translated: "data/mock_files/青蛙王子-字幕.srt"
  valid_video: "data/mock_files/青蛙王子.mp4"
  invalid_audio: "data/mock_files/invalid_audio.txt"
  invalid_subtitle: "data/mock_files/invalid_subtitle.txt"
  invalid_video: "data/mock_files/invalid_video.avi"
  oversize_audio_11mb: "data/mock_files/oversize_audio_11mb.wav"
  oversize_subtitle_2mb: "data/mock_files/oversize_subtitle_2mb.srt"
  oversize_video_2100mb: "data/mock_files/oversize_video_2100mb.mp4"
  oversize_speaker_51mb: "data/mock_files/oversize_speaker_51mb.mp3"

voice_clone:
  limit:
    input: "audio"
    file_duration: "1s-30s"
    max_size: "10MB"
  cases:
    # --- 字段说明 ---
    # file_key: 上传文件的引用key，对应 files 块中定义的文件（null=不上传）
    # form: multipart 表单字段，最终作为 HTTP data 参数发送
    # ---
    - id: "VC_POS_001"
      title: "语音克隆-上传合法音频"
      category: "positive"
      file_key: "valid_clone_audio"
      form:
        body: '{"carry_back":"自定义数据"}'
      expected:
        http_status: 200
        code: 200
        required_fields: ["code", "request_id"]
    - id: "VC_NEG_001"
      title: "语音克隆-缺失音频文件"
      category: "negative"
      file_key: null
      form:
        body: '{"carry_back":"voice-clone-missing-file"}'
      expected:
        http_status_any: [400, 422, 500]
        message_contains_any: ["audio", "文件不能为空", "为空", "未上传", "FileInvalid"]
    - id: "VC_NEG_002"
      title: "语音克隆-音频格式错误"
      category: "negative"
      file_key: "valid_video"
      form:
        body: '{"carry_back":"voice-clone-invalid-format"}'
      expected:
        http_status: 200
        code: 400
        message_contains_any: ["不支持的文件类型", "mp3/wav/m4a","FileInvalid"]
    - id: "VC_NEG_003"
      title: "语音克隆-音频超过10MB"
      category: "negative"
      file_key: "valid_clone_50mb"
      form:
        body: '{"carry_back":"voice-clone-oversize"}'
      expected:
        http_status: 200
        code: 400
        message_contains_any: ["文件大小不能超过10MB", "10MB", "大小", "超过", "文件"]
    - id: "VC_NEG_004"
      title: "语音克隆-音频超过30s"
      category: "negative"
      file_key: "valid_clone_1min_10mb"
      form:
        body: '{"carry_back":"voice-clone-oversize"}'
      expected:
        http_status: 200
        code: 400
        message_contains_any: ["文件大小不能超过30s", "30s", "大小", "超过", "文件"]

voice_infer:
  limit:
    input: "audio and text"
    audio_duration: "1s-30s"
    audio_max_size: "10MB"
    text_max_chars: 3000
  cases:
    # --- 字段说明 ---
    # form: 表单字段（speaker_id / text / speed / volume / sample_rate 等）
    # text_repeat: 将 text 自动扩展到指定长度，用于超长文本边界测试
    # ---
    - id: "VI_POS_001"
      title: "语音合成-使用speaker_id和合法文本"
      category: "positive"
      form:
        speaker_id: "{{speaker_id}}"
        text: "你好，欢迎使用语音合成接口。"
        speed: "1.0"
        volume: "1.0"
        sample_rate: "24000"
      expected:
        http_status: 200
        code: 200
        required_fields: ["code", "data", "request_id"]
    # - id: "VI_NEG_001"
    #   title: "语音合成-缺失文本"
    #   category: "negative"
    #   form:
    #     speaker_id: "{{speaker_id}}"
    #     speed: "1.0"
    #   expected:
    #     http_status_any: [400, 422, 500]
    #     message_contains_any: ["text", "文本", "不能为空", "参数"]

