[pytest]
addopts = -q --strict-markers --html=reports/report.html --self-contained-html --alluredir=reports/allure-results
testpaths = tests
markers =
    live: tests that call the real Shanhai OpenAPI service
    contract: local validation of framework data and case definitions
    smoke: core positive-path checks
    negative: error, auth, and invalid parameter checks
    boundary: boundary value checks
    openapi: OpenAPI/Swagger/Apifox contract synchronization checks
